<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>鼠标灵敏训练营 · 极速瞄准</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a1a1f 0%, #0c2a2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(10, 25, 30, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 3rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(80, 180, 200, 0.3);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 2rem;
            box-shadow: 0 0 0 3px rgba(0,180,200,0.4), 0 15px 25px rgba(0,0,0,0.3);
            cursor: crosshair;
            background: #0e2a2e;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
            padding: 0.5rem 1rem;
            background: rgba(0,0,0,0.5);
            border-radius: 3rem;
            backdrop-filter: blur(4px);
        }

        .stat {
            background: #071a1e;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-weight: bold;
            color: #b6f0ff;
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
            box-shadow: inset 0 1px 3px #00000040, 0 2px 4px rgba(0,0,0,0.3);
        }

        .stat span {
            color: #f5d742;
            font-size: 1.6rem;
            font-weight: 800;
            margin-left: 8px;
            text-shadow: 0 0 5px #ffb347;
        }

        .badge {
            background: #1e3a3f;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #aae3f0;
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-top: 1.2rem;
            gap: 1rem;
        }

        button {
            background: #2f5f68;
            border: none;
            padding: 0.6rem 1.8rem;
            border-radius: 3rem;
            font-weight: bold;
            font-size: 1rem;
            font-family: inherit;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #14343c;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #14343c;
        }

        .restart-btn {
            background: #ff8c42;
            box-shadow: 0 5px 0 #b4520c;
            color: #1e2a2e;
        }

        .info-text {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #79b8c5;
        }

        .feedback {
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.1s;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="stats-panel">
            <div class="stat">🎯 得分 <span id="scoreValue">0</span></div>
            <div class="stat">⏱️ 剩余 <span id="timeValue">60</span> s</div>
            <div class="stat">📐 目标半径 <span id="radiusValue">20</span> px</div>
            <div class="stat">⚡ 速度 <span id="speedValue">2.5</span></div>
        </div>
        <canvas id="gameCanvas" width="900" height="550" style="width:100%; height:auto; max-width:900px; aspect-ratio:900/550"></canvas>
        <div class="controls">
            <button id="resetGameBtn" class="restart-btn">🔄 重新训练</button>
        </div>
        <div class="info-text">
            🖱️ 鼠标移动到圆形靶心并点击 → +10分 / 打偏 → -5分 &nbsp;&nbsp;|&nbsp;&nbsp; 分数越高，目标越小越快！
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- 画布元素 -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ----- UI 元素 -----
        const scoreSpan = document.getElementById('scoreValue');
        const timeSpan = document.getElementById('timeValue');
        const radiusSpan = document.getElementById('radiusValue');
        const speedSpan = document.getElementById('speedValue');

        // ----- 游戏配置 -----
        const W = 900, H = 550;
        canvas.width = W;
        canvas.height = H;

        // 游戏状态
        let score = 0;
        let timeLeft = 60;          // 秒
        let gameActive = true;       // 是否进行中
        let animationId = null;
        let timerInterval = null;

        // 目标参数
        let target = {
            x: W/2,
            y: H/2,
            vx: 2.2,
            vy: 1.8,
            radius: 20
        };

        // 难度范围限制
        const MIN_RADIUS = 8;
        const MAX_RADIUS = 24;
        const MIN_SPEED = 1.8;
        const MAX_SPEED = 9.0;
        let currentBaseSpeed = 2.5;   // 用于显示和调节速度大小
        
        // 临时特效 (命中/失误)
        let effect = {
            active: false,
            type: '',   // 'hit' or 'miss'
            x: 0,
            y: 0,
            timer: 0
        };

        // ----- 辅助函数: 随机位置 (避免过于靠近边缘)-----
        function getRandomPosition() {
            let margin = target.radius + 5;
            let x = margin + Math.random() * (W - margin * 2);
            let y = margin + Math.random() * (H - margin * 2);
            return { x, y };
        }

        // 随机速度方向 (保持当前速率大小)
        function randomVelocity(speedMagnitude) {
            let angle = Math.random() * Math.PI * 2;
            let vx = Math.cos(angle) * speedMagnitude;
            let vy = Math.sin(angle) * speedMagnitude;
            return { vx, vy };
        }

        // 根据分数调整难度 (半径递减，速度递增)
        function updateDifficultyByScore() {
            // 分数越高越难: 每获得30分调整一次参数 (平滑过渡)
            let intensity = Math.min(1.0, score / 220);  // 最高大约220分时达到极限难度
            // 半径: 从20 降到 MIN_RADIUS
            let newRadius = MAX_RADIUS - (MAX_RADIUS - MIN_RADIUS) * intensity;
            newRadius = Math.max(MIN_RADIUS, Math.min(MAX_RADIUS, newRadius));
            // 速度: 从2.5 升到 MAX_SPEED
            let newSpeed = MIN_SPEED + (MAX_SPEED - MIN_SPEED) * intensity;
            newSpeed = Math.min(MAX_SPEED, Math.max(MIN_SPEED, newSpeed));
            
            target.radius = Math.floor(newRadius * 10) / 10;
            currentBaseSpeed = newSpeed;
            
            // 保持速度方向，只改变速率大小
            let currentMagnitude = Math.hypot(target.vx, target.vy);
            if (currentMagnitude > 0.01) {
                let ratio = newSpeed / currentMagnitude;
                target.vx *= ratio;
                target.vy *= ratio;
            } else {
                let rand = randomVelocity(newSpeed);
                target.vx = rand.vx;
                target.vy = rand.vy;
            }
            
            // 更新UI显示
            radiusSpan.innerText = Math.floor(target.radius);
            speedSpan.innerText = newSpeed.toFixed(1);
        }

        // 命中目标处理
        function handleHit(clickX, clickY) {
            if (!gameActive) return false;
            
            const dx = clickX - target.x;
            const dy = clickY - target.y;
            const dist = Math.hypot(dx, dy);
            
            if (dist <= target.radius) {
                // 命中！
                score += 10;
                scoreSpan.innerText = score;
                
                // 特效：命中闪光
                effect.active = true;
                effect.type = 'hit';
                effect.x = target.x;
                effect.y = target.y;
                effect.timer = 8;  // 持续帧数
                
                // 难度更新 (根据最新分数)
                updateDifficultyByScore();
                
                // 目标重置到新位置，并赋予随机方向（基于当前速度大小）
                let newPos = getRandomPosition();
                target.x = newPos.x;
                target.y = newPos.y;
                let newVel = randomVelocity(currentBaseSpeed);
                target.vx = newVel.vx;
                target.vy = newVel.vy;
                
                // 确保重置后不会与边界卡死（二次保险）
                constrainTargetPosition();
                
                // 可选：轻微震动反馈 (仅视觉，不晃窗口)
                return true;
            } else {
                // 未命中 -> 扣分
                score = Math.max(-30, score - 5);  // 最低 -30 分防止刷负分太沮丧
                scoreSpan.innerText = score;
                
                // 失误特效
                effect.active = true;
                effect.type = 'miss';
                effect.x = clickX;
                effect.y = clickY;
                effect.timer = 6;
                
                // 失误也稍微调整难度（让分数降低后难度稍微回调）但是通过updateDifficultyByScore会自动适配当前分数
                updateDifficultyByScore();
                return false;
            }
        }
        
        // 边界碰撞 (弹性反弹 + 位置修正)
        function handleBoundary() {
            let rad = target.radius;
            if (target.x - rad < 0) {
                target.x = rad;
                target.vx = -target.vx;
            }
            if (target.x + rad > W) {
                target.x = W - rad;
                target.vx = -target.vx;
            }
            if (target.y - rad < 0) {
                target.y = rad;
                target.vy = -target.vy;
            }
            if (target.y + rad > H) {
                target.y = H - rad;
                target.vy = -target.vy;
            }
        }
        
        // 确保位置不超出边界 (用于重置后)
        function constrainTargetPosition() {
            let rad = target.radius;
            target.x = Math.min(Math.max(target.x, rad), W - rad);
            target.y = Math.min(Math.max(target.y, rad), H - rad);
        }
        
        // 更新目标位置 (基于速度)
        function updatePosition() {
            if (!gameActive) return;
            target.x += target.vx;
            target.y += target.vy;
            handleBoundary();
        }
        
        // 特效更新计时
        function updateEffect() {
            if (effect.active) {
                effect.timer--;
                if (effect.timer <= 0) {
                    effect.active = false;
                }
            }
        }
        
        // ----- 绘图部分（炫酷瞄准反馈）-----
        function draw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, W, H);
            
            // 背景网格 + 科技感
            ctx.strokeStyle = "#2c6c74";
            ctx.lineWidth = 0.6;
            for (let i = 0; i < W; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, H);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i % H);
                ctx.lineTo(W, i % H);
                ctx.stroke();
            }
            
            // 绘制动态目标: 带有光晕的靶心
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#00f0ff";
            // 外发光圆
            let grad = ctx.createRadialGradient(target.x-3, target.y-3, 3, target.x, target.y, target.radius+2);
            grad.addColorStop(0, "#ff5e00");
            grad.addColorStop(0.7, "#cc2b00");
            grad.addColorStop(1, "#8a0e00");
            ctx.beginPath();
            ctx.arc(target.x, target.y, target.radius+2, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(target.x, target.y, target.radius-3, 0, Math.PI*2);
            ctx.fillStyle = "#FFF9C4";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(target.x, target.y, target.radius-7, 0, Math.PI*2);
            ctx.fillStyle = "#FF5722";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(target.x, target.y, 4, 0, Math.PI*2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(target.x, target.y, target.radius-1, 0, Math.PI*2);
            ctx.strokeStyle = "#ffc107";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 命中特效
            if (effect.active) {
                ctx.save();
                ctx.shadowBlur = 0;
                if (effect.type === 'hit') {
                    ctx.beginPath();
                    ctx.arc(effect.x, effect.y, target.radius + 12, 0, Math.PI*2);
                    ctx.fillStyle = "rgba(255, 215, 0, 0.6)";
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(effect.x, effect.y, target.radius + 5, 0, Math.PI*2);
                    ctx.fillStyle = "rgba(255, 100, 0, 0.7)";
                    ctx.fill();
                    // 显示 +10
                    ctx.font = "bold 24px 'Segoe UI'";
                    ctx.fillStyle = "#FFE484";
                    ctx.shadowBlur = 6;
                    ctx.fillText("+10", effect.x+12, effect.y-18);
                } else {
                    ctx.beginPath();
                    ctx.arc(effect.x, effect.y, 18, 0, Math.PI*2);
                    ctx.fillStyle = "rgba(255, 50, 50, 0.5)";
                    ctx.fill();
                    ctx.font = "bold 20px monospace";
                    ctx.fillStyle = "#ff8888";
                    ctx.fillText("-5", effect.x+10, effect.y-12);
                }
                ctx.restore();
            }
            
            // 绘制鼠标瞄准辅助 (动态准星)
            // 不获取鼠标位置，直接画十字架在目标旁边? 更友好: 在画布四周显示微标
            ctx.font = "bold 12px monospace";
            ctx.fillStyle = "#aaddee";
            ctx.fillText("⚡ 快速点击移动靶心 ⚡", 20, 35);
        }
        
        // ----- 动画循环 (移动+重绘) -----
        function animate() {
            if (!gameActive) {
                // 游戏结束依然绘制静态画面但不更新位置
                draw();
                return;
            }
            updatePosition();
            updateEffect();
            draw();
            animationId = requestAnimationFrame(animate);
        }
        
        // ----- 计时器逻辑 -----
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                if (timeLeft <= 1) {
                    // 游戏结束
                    timeLeft = 0;
                    timeSpan.innerText = "0";
                    endGame();
                } else {
                    timeLeft--;
                    timeSpan.innerText = timeLeft;
                }
            }, 1000);
        }
        
        // 游戏结束
        function endGame() {
            if (!gameActive) return;
            gameActive = false;
            if (animationId) cancelAnimationFrame(animationId);
            if (timerInterval) clearInterval(timerInterval);
            animationId = null;
            timerInterval = null;
            
            // 绘制结束画面
            draw();
            ctx.font = "bold 36px 'Orbitron'";
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#ffdd99";
            ctx.shadowColor = "#000";
            ctx.fillText("GAME OVER", W/2-130, H/2-50);
            ctx.font = "24px 'Segoe UI'";
            ctx.fillStyle = "#b6ffdd";
            ctx.fillText("最终得分: "+score, W/2-100, H/2+30);
            ctx.font = "16px monospace";
            ctx.fillStyle = "#bbddff";
            ctx.fillText("点击「重新训练」继续挑战", W/2-150, H/2+90);
        }
        
        // 重置所有数据，重新开始
        function resetAndStart() {
            // 停止之前的所有动画/计时
            if (animationId) cancelAnimationFrame(animationId);
            if (timerInterval) clearInterval(timerInterval);
            
            // 重置变量
            gameActive = true;
            score = 0;
            timeLeft = 60;
            scoreSpan.innerText = "0";
            timeSpan.innerText = "60";
            
            // 重置目标参数 (初始半径20，速度2.5)
            target.radius = 20;
            currentBaseSpeed = 2.5;
            // 随机起始位置和速度方向
            let startPos = getRandomPosition();
            target.x = startPos.x;
            target.y = startPos.y;
            let startVel = randomVelocity(currentBaseSpeed);
            target.vx = startVel.vx;
            target.vy = startVel.vy;
            constrainTargetPosition();
            
            // 更新UI显示半径和速度
            radiusSpan.innerText = target.radius;
            speedSpan.innerText = currentBaseSpeed.toFixed(1);
            
            // 清除特效
            effect.active = false;
            
            // 重新启动动画和计时
            animationId = requestAnimationFrame(animate);
            startTimer();
        }
        
        // ----- 鼠标点击事件 (canvas坐标转换)-----
        function getMousePos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;   // canvas物理像素比
            const scaleY = canvas.height / rect.height;
            let mouseX = (evt.clientX - rect.left) * scaleX;
            let mouseY = (evt.clientY - rect.top) * scaleY;
            mouseX = Math.min(Math.max(mouseX, 0), W);
            mouseY = Math.min(Math.max(mouseY, 0), H);
            return { mx: mouseX, my: mouseY };
        }
        
        function onCanvasClick(e) {
            if (!gameActive) return;
            const { mx, my } = getMousePos(canvas, e);
            handleHit(mx, my);
            // 重新调整难度后刷新UI速度半径 (已在 handleHit 里调用 updateDifficultyByScore)
            // 额外强制更新显示，确保滑条
            radiusSpan.innerText = Math.floor(target.radius);
            let curSpeed = Math.hypot(target.vx, target.vy);
            speedSpan.innerText = curSpeed.toFixed(1);
        }
        
        // 重置按钮
        const resetBtn = document.getElementById('resetGameBtn');
        resetBtn.addEventListener('click', () => {
            resetAndStart();
        });
        
        // 添加canvas事件
        canvas.addEventListener('click', onCanvasClick);
        
        // 鼠标移动效果: 改变画布光标样式（已设置crosshair）
        // 可选额外显示跟随光晕，提升灵敏度训练体验
        let mouseXcanvas = W/2, mouseYcanvas = H/2;
        canvas.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            const { mx, my } = getMousePos(canvas, e);
            mouseXcanvas = mx;
            mouseYcanvas = my;
            // 简单绘制跟随准星 (在下一帧绘制前实时)
        });
        
        // 在draw中额外增加跟随准星 (实时瞄准镜)
        const originalDraw = draw;
        window.draw = function() {
            originalDraw();
            if (gameActive && canvas && ctx) {
                // 获取当前鼠标坐标 （通过变量存储）
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(mouseXcanvas, mouseYcanvas, 6, 0, Math.PI*2);
                ctx.strokeStyle = "#ffff80";
                ctx.lineWidth = 1.8;
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(mouseXcanvas-12, mouseYcanvas);
                ctx.lineTo(mouseXcanvas-5, mouseYcanvas);
                ctx.moveTo(mouseXcanvas+5, mouseYcanvas);
                ctx.lineTo(mouseXcanvas+12, mouseYcanvas);
                ctx.moveTo(mouseXcanvas, mouseYcanvas-12);
                ctx.lineTo(mouseXcanvas, mouseYcanvas-5);
                ctx.moveTo(mouseXcanvas, mouseYcanvas+5);
                ctx.lineTo(mouseXcanvas, mouseYcanvas+12);
                ctx.stroke();
                ctx.restore();
            }
        };
        // 覆盖draw函数
        draw = window.draw;
        
        // 启动游戏
        resetAndStart();
        
        // 防窗口缩放影响坐标 (监听resize重新计算，无需额外)
    })();
</script>
</body>
</html>
